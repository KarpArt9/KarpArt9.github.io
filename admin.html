<!DOCTYPE HTML>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админ-панель – Райский холод</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body { background: #f0f7f4; font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px 0; }
        .container { max-width: 1100px; }
        .login-box {
            background: #fff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .login-box h2 { color: #0d4a3a; margin-bottom: 20px; }
        .login-box .form-control { border-radius: 60px; padding: 12px 20px; }
        .login-box .btn { border-radius: 60px; background: #0d4a3a; color: #fff; padding: 12px 30px; }
        .login-box .btn:hover { background: #2ecc71; }
        .admin-panel { display: none; }
        .admin-header {
            background: #0d4a3a;
            color: #fff;
            padding: 15px 0;
            border-radius: 20px 20px 0 0;
        }
        .admin-header h2 { margin: 0; font-weight: 300; }
        .admin-header .logout { color: #2ecc71; cursor: pointer; }
        .admin-header .logout:hover { color: #fff; }
        .nav-tabs { border-bottom: 2px solid #2ecc71; }
        .nav-tabs > li.active > a {
            background: #2ecc71;
            color: #fff;
            border: none;
            border-radius: 20px 20px 0 0;
        }
        .nav-tabs > li > a { color: #0d4a3a; border: none; }
        .nav-tabs > li > a:hover { background: #d5f5e3; border: none; }
        .tab-content { background: #fff; padding: 30px; border-radius: 0 0 20px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
        .product-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e8f0ec;
            gap: 15px;
            flex-wrap: wrap;
        }
        .product-row .name { flex: 2; min-width: 150px; font-weight: 500; }
        .product-row .price { flex: 1; min-width: 100px; }
        .product-row .image-upload { flex: 2; min-width: 200px; }
        .product-row .image-preview { max-width: 80px; max-height: 80px; border-radius: 8px; object-fit: cover; }
        .btn-sm { padding: 4px 12px; border-radius: 60px; }
        .gallery-item { border: 1px solid #e8f0ec; border-radius: 16px; padding: 15px; text-align: center; background: #fafdfb; }
        .gallery-item img { max-width: 100%; height: 150px; object-fit: cover; border-radius: 12px; }
        .gallery-item .title { font-weight: 600; margin-top: 8px; }
        .gallery-item .desc { font-size: 13px; color: #5a7a6e; }
        .status-msg { margin-top: 15px; font-weight: 500; }
        .status-msg.success { color: #2ecc71; }
        .status-msg.error { color: #e74c3c; }
        .add-product-form { background: #fafdfb; padding: 20px; border-radius: 16px; margin-bottom: 30px; border: 1px dashed #2ecc71; }
        .add-product-form .form-group { margin-bottom: 15px; }
        @media (max-width: 768px) {
            .product-row { flex-direction: column; align-items: stretch; }
            .product-row .name { text-align: center; }
        }
    </style>
</head>
<body>

<div class="container" id="loginContainer">
    <div class="login-box">
        <h2><i class="fa fa-lock"></i> Вход в админку</h2>
        <form id="loginForm">
            <div class="form-group">
                <input type="password" class="form-control" id="adminPassword" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn btn-block">Войти</button>
            <p class="text-muted" style="margin-top:15px; font-size:13px;">Пароль по умолчанию: <strong>admin123</strong></p>
        </form>
    </div>
</div>

<div class="container admin-panel" id="adminPanel">
    <div class="admin-header">
        <div class="row">
            <div class="col-xs-8">
                <h2><i class="fa fa-cog"></i> Панель управления</h2>
            </div>
            <div class="col-xs-4 text-right">
                <span class="logout" id="logoutBtn"><i class="fa fa-sign-out"></i> Выйти</span>
            </div>
        </div>
    </div>

    <ul class="nav nav-tabs" role="tablist">
        <li role="presentation" class="active"><a href="#tabPrices" aria-controls="tabPrices" role="tab" data-toggle="tab">Цены</a></li>
        <li role="presentation"><a href="#tabProducts" aria-controls="tabProducts" role="tab" data-toggle="tab">Фото товаров</a></li>
        <li role="presentation"><a href="#tabGallery" aria-controls="tabGallery" role="tab" data-toggle="tab">Галерея</a></li>
        <li role="presentation"><a href="#tabManage" aria-controls="tabManage" role="tab" data-toggle="tab">Управление товарами</a></li>
    </ul>

    <div class="tab-content">
        <!-- Вкладка Цены -->
        <div role="tabpanel" class="tab-pane active" id="tabPrices">
            <h3>Редактирование цен</h3>
            <div id="priceList"></div>
            <button class="btn btn-success" id="savePricesBtn"><i class="fa fa-save"></i> Сохранить все цены</button>
            <div id="priceStatus" class="status-msg"></div>
        </div>

        <!-- Вкладка Фото товаров -->
        <div role="tabpanel" class="tab-pane" id="tabProducts">
            <h3>Загрузка фото для товаров</h3>
            <div id="productImageList"></div>
        </div>

        <!-- Вкладка Галерея -->
        <div role="tabpanel" class="tab-pane" id="tabGallery">
            <h3>Управление галереей работ</h3>
            <form id="galleryForm" class="form-inline" style="margin-bottom:20px;">
                <div class="form-group">
                    <input type="file" id="galleryFile" accept="image/*" required>
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" id="galleryTitle" placeholder="Заголовок">
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" id="galleryDesc" placeholder="Описание">
                </div>
                <button type="submit" class="btn btn-primary"><i class="fa fa-upload"></i> Добавить</button>
            </form>
            <div id="galleryList" class="row"></div>
            <div id="galleryStatus" class="status-msg"></div>
        </div>

        <!-- Вкладка Управление товарами -->
        <div role="tabpanel" class="tab-pane" id="tabManage">
            <h3>Управление товарами</h3>
            <!-- Форма добавления -->
            <div class="add-product-form">
                <h4><i class="fa fa-plus-circle"></i> Добавить новый товар</h4>
                <form id="addProductForm" class="row">
                    <div class="col-sm-4">
                        <div class="form-group">
                            <label>Название товара</label>
                            <input type="text" class="form-control" id="newProductName" placeholder="Например: Ballu BSQ-12" required>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="form-group">
                            <label>Цена (₽)</label>
                            <input type="text" class="form-control" id="newProductPrice" placeholder="29900" required>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <div class="form-group">
                            <label>Категория</label>
                            <select class="form-control" id="newProductCategory">
                                <option value="splits">Сплит-системы</option>
                                <option value="mobile">Мобильные</option>
                                <option value="heaters">Обогреватели</option>
                                <option value="water">Водонагреватели</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-sm-2">
                        <div class="form-group">
                            <label>Фото</label>
                            <input type="file" class="form-control" id="newProductImage" accept="image/*">
                        </div>
                    </div>
                    <div class="col-sm-12 text-right">
                        <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> Добавить товар</button>
                    </div>
                </form>
            </div>
            <!-- Список товаров -->
            <div id="productManageList"></div>
            <div id="manageStatus" class="status-msg"></div>
        </div>
    </div>
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const ADMIN_PASSWORD = 'admin123';
    // ===================================================

    // ------------------ Вход / Выход ------------------
    function checkAuth() {
        if (sessionStorage.getItem('adminLogged') === 'true') {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            initAdmin();
        } else {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const pass = document.getElementById('adminPassword').value;
        if (pass === ADMIN_PASSWORD) {
            sessionStorage.setItem('adminLogged', 'true');
            checkAuth();
        } else {
            alert('Неверный пароль!');
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
        sessionStorage.removeItem('adminLogged');
        checkAuth();
    });

    // ------------------ Данные ------------------
    // Список товаров по умолчанию (используется для инициализации и как резерв)
    const DEFAULT_PRODUCTS = [
        { id: 'ballu1', name: 'Ballu BSQ-09HN1', price: 28900, category: 'splits', image: '' },
        { id: 'hisense1', name: 'Hisense AS-09UR4SYDDB1', price: 32500, category: 'splits', image: '' },
        { id: 'lg1', name: 'LG CS09AWK', price: 29900, category: 'splits', image: '' },
        { id: 'electrolux1', name: 'Electrolux EMO-12', price: 23990, category: 'mobile', image: '' },
        { id: 'zanussi1', name: 'Zanussi ZACM-09', price: 21500, category: 'mobile', image: '' },
        { id: 'bimatek1', name: 'Bimatek AM400', price: 18990, category: 'mobile', image: '' },
        { id: 'timberk1', name: 'Timberk TCH A5N', price: 3990, category: 'heaters', image: '' },
        { id: 'ballu2', name: 'Ballu BEC 1500', price: 4900, category: 'heaters', image: '' },
        { id: 'noirot1', name: 'Noirot CNX-2', price: 7990, category: 'heaters', image: '' },
        { id: 'electrolux2', name: 'Electrolux EWH 50', price: 9990, category: 'water', image: '' },
        { id: 'thermex1', name: 'Thermex Flat Plus 50', price: 11500, category: 'water', image: '' },
        { id: 'gorenje1', name: 'Gorenje OG 50', price: 10200, category: 'water', image: '' }
    ];

    // Получение списка товаров из localStorage (если нет – создаём из DEFAULT)
    function getProducts() {
        const stored = localStorage.getItem('products');
        if (stored) {
            try { return JSON.parse(stored); } catch(e) {}
        }
        // Инициализируем товарами по умолчанию
        const products = DEFAULT_PRODUCTS.map(p => ({ ...p }));
        localStorage.setItem('products', JSON.stringify(products));
        return products;
    }

    // Сохранение списка товаров
    function saveProducts(products) {
        localStorage.setItem('products', JSON.stringify(products));
    }

    // Получение цен (отдельно для быстрого доступа)
    function getPrices() {
        const products = getProducts();
        const prices = {};
        products.forEach(p => {
            prices[p.id] = String(p.price);
        });
        return prices;
    }

    function savePrices(prices) {
        const products = getProducts();
        products.forEach(p => {
            if (prices[p.id] !== undefined) {
                p.price = parseInt(prices[p.id]) || 0;
            }
        });
        saveProducts(products);
    }

    function getProductImages() {
        const stored = localStorage.getItem('productImages');
        if (stored) {
            try { return JSON.parse(stored); } catch(e) {}
        }
        return {};
    }

    function saveProductImages(images) {
        localStorage.setItem('productImages', JSON.stringify(images));
    }

    function getGallery() {
        const stored = localStorage.getItem('galleryImages');
        if (stored) {
            try { return JSON.parse(stored); } catch(e) {}
        }
        return [];
    }

    function saveGallery(gallery) {
        localStorage.setItem('galleryImages', JSON.stringify(gallery));
    }

    // ------------------ Рендеринг вкладок ------------------
    function renderPrices() {
        const products = getProducts();
        const container = document.getElementById('priceList');
        let html = '<table class="table"><thead><tr><th>Товар</th><th>Текущая цена</th><th>Новая цена</th></tr></thead><tbody>';
        products.forEach(p => {
            html += `<tr>
                        <td><strong>${p.name}</strong> <span class="text-muted">(${p.id})</span></td>
                        <td>${p.price} ₽</td>
                        <td><input type="text" class="form-control input-sm price-input" data-id="${p.id}" value="${p.price}" placeholder="Цена"></td>
                    </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderProductImages() {
        const products = getProducts();
        const images = getProductImages();
        const container = document.getElementById('productImageList');
        let html = '';
        products.forEach(p => {
            const imgSrc = images[p.id] || '';
            html += `<div class="product-row">
                        <div class="name">${p.name}</div>
                        <div class="image-upload">
                            <input type="file" class="product-image-input" accept="image/*" data-id="${p.id}">
                            <button class="btn btn-primary btn-sm upload-product-image" data-id="${p.id}">Загрузить</button>
                            ${imgSrc ? `<button class="btn btn-danger btn-sm delete-product-image" data-id="${p.id}">Удалить</button>` : ''}
                        </div>
                        <div class="image-preview-container">
                            ${imgSrc ? `<img src="${imgSrc}" class="image-preview" alt="${p.name}">` : '<span class="text-muted">Нет фото</span>'}
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
    }

    function renderGallery() {
        const gallery = getGallery();
        const container = document.getElementById('galleryList');
        if (gallery.length === 0) {
            container.innerHTML = '<p class="text-muted">Нет изображений в галерее.</p>';
            return;
        }
        let html = '';
        gallery.forEach((item, index) => {
            html += `<div class="col-sm-6 col-md-4 gallery-item" style="margin-bottom:20px;">
                        <img src="${item.image}" alt="${item.title || 'Фото'}">
                        <div class="title">${item.title || ''}</div>
                        <div class="desc">${item.description || ''}</div>
                        <button class="btn btn-danger btn-sm delete-gallery-item" data-index="${index}"><i class="fa fa-trash"></i> Удалить</button>
                    </div>`;
        });
        container.innerHTML = html;
    }

    function renderProductManage() {
        const products = getProducts();
        const container = document.getElementById('productManageList');
        if (products.length === 0) {
            container.innerHTML = '<p class="text-muted">Нет товаров.</p>';
            return;
        }
        let html = '<table class="table"><thead><tr><th>Название</th><th>Цена</th><th>Категория</th><th>Действия</th></tr></thead><tbody>';
        products.forEach((p, index) => {
            html += `<tr>
                        <td>${p.name}</td>
                        <td>${p.price} ₽</td>
                        <td>${p.category}</td>
                        <td>
                            <button class="btn btn-danger btn-sm delete-product" data-index="${index}"><i class="fa fa-trash"></i> Удалить</button>
                        </td>
                    </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // ------------------ Инициализация админки ------------------
    function initAdmin() {
        renderPrices();
        renderProductImages();
        renderGallery();
        renderProductManage();

        // Сохранение цен
        document.getElementById('savePricesBtn').addEventListener('click', function() {
            const inputs = document.querySelectorAll('.price-input');
            const prices = {};
            inputs.forEach(input => {
                const id = input.dataset.id;
                const val = input.value.trim().replace(/\s/g, '');
                if (val && !isNaN(val)) {
                    prices[id] = val;
                }
            });
            savePrices(prices);
            document.getElementById('priceStatus').textContent = '✅ Цены сохранены!';
            document.getElementById('priceStatus').className = 'status-msg success';
            setTimeout(() => {
                document.getElementById('priceStatus').textContent = '';
            }, 3000);
            renderProductManage(); // обновить список товаров (цены обновятся)
        });

        // Загрузка фото товаров
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('upload-product-image')) {
                const id = e.target.dataset.id;
                const input = document.querySelector(`.product-image-input[data-id="${id}"]`);
                if (!input || !input.files || input.files.length === 0) {
                    alert('Выберите файл!');
                    return;
                }
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const base64 = ev.target.result;
                    const images = getProductImages();
                    images[id] = base64;
                    saveProductImages(images);
                    renderProductImages();
                };
                reader.readAsDataURL(file);
            }

            if (e.target.classList.contains('delete-product-image')) {
                const id = e.target.dataset.id;
                if (confirm('Удалить фото для этого товара?')) {
                    const images = getProductImages();
                    delete images[id];
                    saveProductImages(images);
                    renderProductImages();
                }
            }

            if (e.target.classList.contains('delete-gallery-item')) {
                const index = parseInt(e.target.dataset.index);
                if (confirm('Удалить изображение из галереи?')) {
                    const gallery = getGallery();
                    gallery.splice(index, 1);
                    saveGallery(gallery);
                    renderGallery();
                }
            }

            if (e.target.classList.contains('delete-product')) {
                const index = parseInt(e.target.dataset.index);
                if (confirm('Удалить этот товар?')) {
                    const products = getProducts();
                    products.splice(index, 1);
                    saveProducts(products);
                    renderProductManage();
                    renderPrices();
                    renderProductImages(); // обновить список фото (если они были)
                }
            }
        });

        // Добавление в галерею
        document.getElementById('galleryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('galleryFile');
            const title = document.getElementById('galleryTitle').value.trim();
            const desc = document.getElementById('galleryDesc').value.trim();

            if (!fileInput.files || fileInput.files.length === 0) {
                alert('Выберите изображение!');
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(ev) {
                const base64 = ev.target.result;
                const gallery = getGallery();
                gallery.push({
                    id: Date.now(),
                    image: base64,
                    title: title,
                    description: desc
                });
                saveGallery(gallery);
                renderGallery();
                document.getElementById('galleryForm').reset();
                document.getElementById('galleryStatus').textContent = '✅ Изображение добавлено!';
                document.getElementById('galleryStatus').className = 'status-msg success';
                setTimeout(() => { document.getElementById('galleryStatus').textContent = ''; }, 3000);
            };
            reader.readAsDataURL(file);
        });

        // Добавление нового товара
        document.getElementById('addProductForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('newProductName').value.trim();
            const price = document.getElementById('newProductPrice').value.trim();
            const category = document.getElementById('newProductCategory').value;
            const fileInput = document.getElementById('newProductImage');

            if (!name || !price) {
                alert('Заполните название и цену!');
                return;
            }

            const products = getProducts();
            const newId = 'product_' + Date.now();
            const newProduct = {
                id: newId,
                name: name,
                price: parseInt(price) || 0,
                category: category,
                image: ''
            };

            // Если выбрано фото – загружаем его
            if (fileInput.files && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const base64 = ev.target.result;
                    const images = getProductImages();
                    images[newId] = base64;
                    saveProductImages(images);
                    // Добавляем товар после загрузки фото
                    products.push(newProduct);
                    saveProducts(products);
                    // Обновляем все интерфейсы
                    renderProductManage();
                    renderPrices();
                    renderProductImages();
                    document.getElementById('addProductForm').reset();
                    document.getElementById('manageStatus').textContent = '✅ Товар добавлен!';
                    document.getElementById('manageStatus').className = 'status-msg success';
                    setTimeout(() => { document.getElementById('manageStatus').textContent = ''; }, 3000);
                };
                reader.readAsDataURL(file);
            } else {
                // Без фото
                products.push(newProduct);
                saveProducts(products);
                renderProductManage();
                renderPrices();
                renderProductImages();
                document.getElementById('addProductForm').reset();
                document.getElementById('manageStatus').textContent = '✅ Товар добавлен!';
                document.getElementById('manageStatus').className = 'status-msg success';
                setTimeout(() => { document.getElementById('manageStatus').textContent = ''; }, 3000);
            }
        });

        // Обработка переключения вкладок (Bootstrap сам вызывает, но можно добавить)
        $('a[data-toggle="tab"]').on('shown.bs.tab', function (e) {
            // Обновляем содержимое вкладки при показе
            const target = $(e.target).attr('href');
            if (target === '#tabPrices') renderPrices();
            if (target === '#tabProducts') renderProductImages();
            if (target === '#tabGallery') renderGallery();
            if (target === '#tabManage') renderProductManage();
        });
    }

    // При загрузке проверяем авторизацию
    checkAuth();
</script>
</body>
</html>
